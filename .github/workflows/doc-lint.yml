name: Documentation Governance

on:
  push:
    branches: [ "main" ]
    paths:
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'docs/**'

jobs:
  doc-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for git history checks

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run Governance Check (Structure & Metadata)
        run: |
          python3 scripts/doc_check.py
        continue-on-error: true

      - name: Run Freshness Check
        run: |
          # Check for docs older than 90 days, excluding archives
          python3 scripts/check_docs_freshness.py --days 90
        continue-on-error: true
