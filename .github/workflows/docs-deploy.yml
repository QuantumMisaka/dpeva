name: Deploy Docs

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]

      - name: Fix Links (Pre-build)
        run: |
          cd docs
          python scripts/fix_links.py

      - name: Build Sphinx Docs
        run: |
          cd docs
          make html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/html
          # If branch is main, use 'latest', else use tag name
          destination_dir: ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}
          keep_files: true # Keep old versions
          full_commit_message: "Deploy docs for ${{ github.ref_name }}"
