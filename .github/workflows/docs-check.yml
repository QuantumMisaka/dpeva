name: Docs Build & Check

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'docs/**'
      - 'src/dpeva/config.py'
      - 'src/dpeva/cli.py'
      - 'src/dpeva/workflows/**'
      - 'examples/recipes/**'
      - 'scripts/doc_check.py'
      - 'scripts/check_docs_freshness.py'
      - '.github/workflows/docs-check.yml'
      - '.github/workflows/doc-lint.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'docs/**'
      - 'src/dpeva/config.py'
      - 'src/dpeva/cli.py'
      - 'src/dpeva/workflows/**'
      - 'examples/recipes/**'
      - 'scripts/doc_check.py'
      - 'scripts/check_docs_freshness.py'
      - '.github/workflows/docs-check.yml'
      - '.github/workflows/doc-lint.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[docs]
        # Ensure deepmd-kit is installed if needed for autodoc imports, or mocked
        # pip install deepmd-kit || true 
        
    - name: Build Documentation (Sphinx)
      run: |
        cd docs
        make html SPHINXOPTS="-W --keep-going"
        
    - name: Verify Key Artifacts
      run: |
        if [ ! -f docs/build/html/index.html ]; then
          echo "Error: index.html not found!"
          exit 1
        fi
        if [ ! -f docs/build/html/api/config.html ]; then
          echo "Error: api/config.html not generated!"
          exit 1
        fi
        
    - name: Check Links
      if: github.event_name == 'pull_request'
      run: |
        cd docs
        make linkcheck SPHINXOPTS="-W --keep-going -D linkcheck_ignore='https://github.com/QuantumMisaka/dpeva/.*'"
