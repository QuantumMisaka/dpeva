name: Docs Build & Check

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "docs/**"
      - "README.md"
      - "src/dpeva/**"
      - "examples/recipes/**"
      - "scripts/doc_check.py"
      - "scripts/check_docs_freshness.py"
      - "scripts/verify_docs.sh"
      - ".github/workflows/docs-check.yml"
      - ".github/workflows/doc-lint.yml"
      - ".github/workflows/docs-deploy.yml"
      - ".github/CODEOWNERS"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "docs/**"
      - "README.md"
      - "src/dpeva/**"
      - "examples/recipes/**"
      - "scripts/doc_check.py"
      - "scripts/check_docs_freshness.py"
      - "scripts/verify_docs.sh"
      - ".github/workflows/docs-check.yml"
      - ".github/workflows/doc-lint.yml"
      - ".github/workflows/docs-deploy.yml"
      - ".github/CODEOWNERS"

permissions:
  contents: read

concurrency:
  group: docs-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]
          pip install git+https://gitlab.com/1041176461/ase-abacus.git

      - name: Build Documentation
        run: |
          cd docs
          make html SPHINXOPTS="-W --keep-going"

      - name: Verify key artifacts
        run: |
          test -f docs/build/html/index.html
          test -f docs/build/html/api/config.html

      - name: Check links
        if: github.event_name == 'pull_request'
        run: |
          cd docs
          make linkcheck SPHINXOPTS="-W --keep-going -D linkcheck_ignore='https://github.com/QuantumMisaka/dpeva/.*'"
